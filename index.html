<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimplNotes</title>

  <!-- Playfair Display for elegant serif headings/titles (non-italic) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>
  <div class="blob blob-c"></div>

  <!-- ════ TOP BAR ════ -->
  <header id="topbar">
    <div class="logo-wrap">
      <div class="logo-icon"><span class="mi mi-fill">edit_note</span></div>
      <span class="logo-name">SimplNotes</span>
    </div>
    <button class="icon-btn" id="sb-toggle" title="Toggle index"><span class="mi">menu</span></button>
    <div class="tb-div"></div>
    <div class="topbar-right">
      <button class="btn-pri" id="new-topic-top"><span class="mi">add</span>New Topic</button>
      <button class="icon-btn" title="Settings"><span class="mi">settings</span></button>
      <button class="icon-btn" title="Account"><span class="mi">account_circle</span></button>
    </div>
  </header>

  <!-- ════ LAYOUT ════ -->
  <div id="layout">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sb-head">
        <span class="sb-index-label">Index</span>
        <button class="sb-add-btn" id="sb-add-btn">
          <span class="mi mi-sm">add_circle</span>Start new topic
        </button>
      </div>

      <div class="sb-empty" id="sb-empty">
        <span class="mi">menu_book</span>
        <p>Your notebook is empty.<br>Press <strong>Start new topic</strong> to begin.</p>
      </div>

      <div id="topic-list"></div>

      <div class="sb-footer">
        <a href="#"><span class="mi">help</span>Help</a>
        <a href="#" class="danger"><span class="mi">logout</span>Logout</a>
      </div>
    </aside>

    <!-- STAGE -->
    <main id="stage">

      <!-- Side navigation arrows -->
      <button class="side-nav" id="nav-prev" title="Previous pages (Shift+Tab)">
        <span class="mi">chevron_left</span>
      </button>
      <button class="side-nav" id="nav-next" title="Next pages (Tab)">
        <span class="mi">chevron_right</span>
      </button>

      <!-- Notebook -->
      <div id="notebook">

        <!-- ── LEFT PAGE ── -->
        <div class="page-wrap left" id="wrap-L">
          <div class="nb-page" id="pg-L">

            <div class="pg-head">
              <span class="pg-topic-lbl" id="lbl-L"></span>
              <span class="pg-title-display" id="title-L"></span>
              <span class="pg-num" id="num-L"></span>
            </div>

            <div class="pg-body">
              <!-- FC overlay layer -->
              <div class="fc-overlay" id="fc-ov-L">
                <svg>
                  <defs>
                    <marker id="fc-arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
                      <polygon points="0 0,7 2.5,0 5" fill="rgba(170,164,255,0.65)"/>
                    </marker>
                  </defs>
                </svg>
              </div>
              <div class="page-ed" id="ed-L" contenteditable="true" data-ph="Start writing…"></div>
            </div>

            <!-- ── LEFT TOOLBAR ── -->
            <div class="pg-toolbar" id="pg-toolbar-L">

              <!-- TEXT GROUP -->
              <div class="tb-text-group" id="text-grp-L">

                <!-- Font & size -->
                <select class="tb-sel fnt-sel" title="Font" style="max-width:76px;">
                  <option value="'DM Sans',sans-serif">DM Sans</option>
                  <option value="Georgia,serif">Georgia</option>
                  <option value="'Courier New',monospace">Courier</option>
                  <option value="'Arial',sans-serif">Arial</option>
                </select>
                <select class="tb-sel sz-sel" title="Size" style="max-width:50px;">
                  <option>11px</option><option>12px</option><option>13px</option>
                  <option selected>14px</option><option>16px</option><option>18px</option>
                  <option>20px</option><option>24px</option><option>28px</option>
                </select>

                <div class="tb-sep"></div>

                <!-- Heading dropdown -->
                <div class="hd-wrap">
                  <button class="tb-btn hd-btn" data-tip="Heading style"><span class="mi mi-sm">title</span></button>
                  <div class="hd-drop">
                    <button class="hd-opt" data-tag="h1"><span class="hd-preview">H1</span><span class="hd-label">Heading 1</span></button>
                    <button class="hd-opt" data-tag="h2"><span class="hd-preview">H2</span><span class="hd-label">Heading 2</span></button>
                    <button class="hd-opt" data-tag="h3"><span class="hd-preview">H3</span><span class="hd-label">Sub-heading</span></button>
                    <button class="hd-opt" data-tag="p"><span class="hd-preview" style="font-style:normal;font-size:11px;">¶</span><span class="hd-label">Normal</span></button>
                  </div>
                </div>

                <div class="tb-sep"></div>

                <!-- B I U S -->
                <button class="tb-btn" data-cmd="bold"          data-tip="Bold (Ctrl+B)"      style="font-weight:800;font-size:13px;">B</button>
                <button class="tb-btn" data-cmd="italic"        data-tip="Italic (Ctrl+I)"    style="font-style:italic;font-size:13px;">I</button>
                <button class="tb-btn" data-cmd="underline"     data-tip="Underline (Ctrl+U)" style="text-decoration:underline;font-size:13px;">U</button>
                <button class="tb-btn" data-cmd="strikeThrough" data-tip="Strikethrough"      style="text-decoration:line-through;font-size:12px;">S</button>

                <div class="tb-sep"></div>

                <!-- Align -->
                <button class="tb-btn" data-cmd="justifyLeft"   data-tip="Left">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><rect y="0" width="14" height="1.5" rx=".7"/><rect y="3" width="9" height="1.5" rx=".7"/><rect y="6" width="12" height="1.5" rx=".7"/><rect y="9" width="7" height="1.5" rx=".7"/></svg>
                </button>
                <button class="tb-btn" data-cmd="justifyCenter" data-tip="Center">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><rect y="0" width="14" height="1.5" rx=".7"/><rect x="2.5" y="3" width="9" height="1.5" rx=".7"/><rect x="1" y="6" width="12" height="1.5" rx=".7"/><rect x="3.5" y="9" width="7" height="1.5" rx=".7"/></svg>
                </button>
                <button class="tb-btn" data-cmd="justifyRight"  data-tip="Right">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><rect y="0" width="14" height="1.5" rx=".7"/><rect x="5" y="3" width="9" height="1.5" rx=".7"/><rect x="2" y="6" width="12" height="1.5" rx=".7"/><rect x="7" y="9" width="7" height="1.5" rx=".7"/></svg>
                </button>

                <div class="tb-sep"></div>

                <!-- Lists -->
                <button class="tb-btn" data-cmd="insertUnorderedList" data-tip="Bullets">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><circle cx="1.2" cy="1.4" r="1.1"/><rect x="4" y=".65" width="10" height="1.5" rx=".7"/><circle cx="1.2" cy="5.5" r="1.1"/><rect x="4" y="4.75" width="10" height="1.5" rx=".7"/><circle cx="1.2" cy="9.6" r="1.1"/><rect x="4" y="8.85" width="10" height="1.5" rx=".7"/></svg>
                </button>
                <button class="tb-btn" data-cmd="insertOrderedList" data-tip="Numbers">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><text x="0" y="3" font-size="4" font-family="sans-serif" fill="currentColor">1.</text><rect x="5" y=".65" width="9" height="1.5" rx=".7"/><text x="0" y="7" font-size="4" font-family="sans-serif" fill="currentColor">2.</text><rect x="5" y="4.75" width="9" height="1.5" rx=".7"/><text x="0" y="11" font-size="4" font-family="sans-serif" fill="currentColor">3.</text><rect x="5" y="8.85" width="9" height="1.5" rx=".7"/></svg>
                </button>

                <div class="tb-sep"></div>

                <!-- Colour + highlight -->
                <button class="col-sw" data-tip="Text color" title="Text color">
                  <span class="mi" style="font-size:14px;color:var(--tx-muted)">palette</span>
                  <div class="col-bar"></div>
                  <input type="color" class="col-inp" value="#dee5ff"/>
                </button>
                <button class="tb-btn" data-cmd="hiliteColor" data-tip="Highlight"><span class="mi mi-sm">format_ink_highlighter</span></button>

                <div class="tb-sep"></div>

                <!-- Link + image -->
                <button class="tb-btn lnk-btn" data-tip="Link"><span class="mi mi-sm">link</span></button>
                <button class="tb-btn img-btn" data-tip="Image"><span class="mi mi-sm">image</span></button>
                <input type="file" class="img-inp" accept="image/*" style="display:none"/>

                <div class="tb-sep"></div>

                <!-- Flowchart toggle (always visible) -->
                <button class="tb-btn fc-toggle-btn" data-tip="Flowchart mode"><span class="mi mi-sm">account_tree</span></button>

              </div><!-- /text group -->

              <!-- FC GROUP (hidden until FC mode) -->
              <div class="tb-fc-group" id="fc-grp-L">
                <button class="tb-btn" data-fc="add-rect"    data-tip="Add block"><span class="mi mi-sm">crop_square</span></button>
                <button class="tb-btn" data-fc="add-diamond" data-tip="Decision"><span class="mi mi-sm">diamond</span></button>
                <button class="tb-btn" data-fc="add-cloud"   data-tip="Cloud"><span class="mi mi-sm">blur_on</span></button>
                <button class="tb-btn" data-fc="connect"     data-tip="Connect nodes"><span class="mi mi-sm">linear_scale</span></button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-fc="delete" data-tip="Delete selected" style="color:var(--err)"><span class="mi mi-sm">delete</span></button>
                <button class="tb-btn" data-fc="clear"  data-tip="Clear all"><span class="mi mi-sm">layers_clear</span></button>
                <div class="tb-sep"></div>
                <!-- Exit FC mode button -->
                <button class="tb-btn fc-toggle-btn on" data-tip="Exit flowchart"><span class="mi mi-sm">close</span></button>
              </div>

            </div><!-- /pg-toolbar-L -->
          </div>
        </div><!-- /wrap-L -->

        <!-- SPINE -->
        <div class="spine">
          <div class="s-ring"></div><div class="s-ring"></div><div class="s-ring"></div>
          <div class="s-mid"></div>
          <div class="s-ring"></div><div class="s-ring"></div><div class="s-ring"></div>
        </div>

        <!-- ── RIGHT PAGE ── -->
        <div class="page-wrap right" id="wrap-R">
          <div class="nb-page" id="pg-R">

            <div class="pg-head">
              <span class="pg-topic-lbl" id="lbl-R"></span>
              <span class="pg-title-display" id="title-R"></span>
              <span class="pg-num" id="num-R"></span>
            </div>

            <div class="pg-body">
              <div class="fc-overlay" id="fc-ov-R">
                <svg><!-- shared defs not needed here; fc-arr defined once above --></svg>
              </div>
              <div class="page-ed" id="ed-R" contenteditable="true" data-ph="Continue writing…"></div>
            </div>

            <!-- ── RIGHT TOOLBAR ── -->
            <div class="pg-toolbar" id="pg-toolbar-R">

              <div class="tb-text-group" id="text-grp-R">
                <select class="tb-sel fnt-sel" title="Font" style="max-width:76px;">
                  <option value="'DM Sans',sans-serif">DM Sans</option>
                  <option value="Georgia,serif">Georgia</option>
                  <option value="'Courier New',monospace">Courier</option>
                  <option value="'Arial',sans-serif">Arial</option>
                </select>
                <select class="tb-sel sz-sel" title="Size" style="max-width:50px;">
                  <option>11px</option><option>12px</option><option>13px</option>
                  <option selected>14px</option><option>16px</option><option>18px</option>
                  <option>20px</option><option>24px</option><option>28px</option>
                </select>
                <div class="tb-sep"></div>
                <div class="hd-wrap">
                  <button class="tb-btn hd-btn" data-tip="Heading style"><span class="mi mi-sm">title</span></button>
                  <div class="hd-drop">
                    <button class="hd-opt" data-tag="h1"><span class="hd-preview">H1</span><span class="hd-label">Heading 1</span></button>
                    <button class="hd-opt" data-tag="h2"><span class="hd-preview">H2</span><span class="hd-label">Heading 2</span></button>
                    <button class="hd-opt" data-tag="h3"><span class="hd-preview">H3</span><span class="hd-label">Sub-heading</span></button>
                    <button class="hd-opt" data-tag="p"><span class="hd-preview" style="font-style:normal;font-size:11px;">¶</span><span class="hd-label">Normal</span></button>
                  </div>
                </div>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-cmd="bold"          data-tip="Bold (Ctrl+B)"      style="font-weight:800;font-size:13px;">B</button>
                <button class="tb-btn" data-cmd="italic"        data-tip="Italic (Ctrl+I)"    style="font-style:italic;font-size:13px;">I</button>
                <button class="tb-btn" data-cmd="underline"     data-tip="Underline (Ctrl+U)" style="text-decoration:underline;font-size:13px;">U</button>
                <button class="tb-btn" data-cmd="strikeThrough" data-tip="Strikethrough"      style="text-decoration:line-through;font-size:12px;">S</button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-cmd="justifyLeft"   data-tip="Left">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><rect y="0" width="14" height="1.5" rx=".7"/><rect y="3" width="9" height="1.5" rx=".7"/><rect y="6" width="12" height="1.5" rx=".7"/><rect y="9" width="7" height="1.5" rx=".7"/></svg>
                </button>
                <button class="tb-btn" data-cmd="justifyCenter" data-tip="Center">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><rect y="0" width="14" height="1.5" rx=".7"/><rect x="2.5" y="3" width="9" height="1.5" rx=".7"/><rect x="1" y="6" width="12" height="1.5" rx=".7"/><rect x="3.5" y="9" width="7" height="1.5" rx=".7"/></svg>
                </button>
                <button class="tb-btn" data-cmd="justifyRight"  data-tip="Right">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><rect y="0" width="14" height="1.5" rx=".7"/><rect x="5" y="3" width="9" height="1.5" rx=".7"/><rect x="2" y="6" width="12" height="1.5" rx=".7"/><rect x="7" y="9" width="7" height="1.5" rx=".7"/></svg>
                </button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-cmd="insertUnorderedList" data-tip="Bullets">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><circle cx="1.2" cy="1.4" r="1.1"/><rect x="4" y=".65" width="10" height="1.5" rx=".7"/><circle cx="1.2" cy="5.5" r="1.1"/><rect x="4" y="4.75" width="10" height="1.5" rx=".7"/><circle cx="1.2" cy="9.6" r="1.1"/><rect x="4" y="8.85" width="10" height="1.5" rx=".7"/></svg>
                </button>
                <button class="tb-btn" data-cmd="insertOrderedList" data-tip="Numbers">
                  <svg width="14" height="11" viewBox="0 0 14 11" fill="currentColor"><text x="0" y="3" font-size="4" font-family="sans-serif" fill="currentColor">1.</text><rect x="5" y=".65" width="9" height="1.5" rx=".7"/><text x="0" y="7" font-size="4" font-family="sans-serif" fill="currentColor">2.</text><rect x="5" y="4.75" width="9" height="1.5" rx=".7"/><text x="0" y="11" font-size="4" font-family="sans-serif" fill="currentColor">3.</text><rect x="5" y="8.85" width="9" height="1.5" rx=".7"/></svg>
                </button>
                <div class="tb-sep"></div>
                <button class="col-sw" data-tip="Text color" title="Text color">
                  <span class="mi" style="font-size:14px;color:var(--tx-muted)">palette</span>
                  <div class="col-bar"></div>
                  <input type="color" class="col-inp" value="#dee5ff"/>
                </button>
                <button class="tb-btn" data-cmd="hiliteColor" data-tip="Highlight"><span class="mi mi-sm">format_ink_highlighter</span></button>
                <div class="tb-sep"></div>
                <button class="tb-btn lnk-btn" data-tip="Link"><span class="mi mi-sm">link</span></button>
                <button class="tb-btn img-btn" data-tip="Image"><span class="mi mi-sm">image</span></button>
                <input type="file" class="img-inp" accept="image/*" style="display:none"/>
                <div class="tb-sep"></div>
                <button class="tb-btn fc-toggle-btn" data-tip="Flowchart mode"><span class="mi mi-sm">account_tree</span></button>
              </div>

              <div class="tb-fc-group" id="fc-grp-R">
                <button class="tb-btn" data-fc="add-rect"    data-tip="Add block"><span class="mi mi-sm">crop_square</span></button>
                <button class="tb-btn" data-fc="add-diamond" data-tip="Decision"><span class="mi mi-sm">diamond</span></button>
                <button class="tb-btn" data-fc="add-cloud"   data-tip="Cloud"><span class="mi mi-sm">blur_on</span></button>
                <button class="tb-btn" data-fc="connect"     data-tip="Connect nodes"><span class="mi mi-sm">linear_scale</span></button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-fc="delete" data-tip="Delete selected" style="color:var(--err)"><span class="mi mi-sm">delete</span></button>
                <button class="tb-btn" data-fc="clear"  data-tip="Clear all"><span class="mi mi-sm">layers_clear</span></button>
                <div class="tb-sep"></div>
                <button class="tb-btn fc-toggle-btn on" data-tip="Exit flowchart"><span class="mi mi-sm">close</span></button>
              </div>

            </div><!-- /pg-toolbar-R -->
          </div>
        </div><!-- /wrap-R -->

      </div><!-- /notebook -->
    </main>
  </div><!-- /layout -->

  <!-- Link popover -->
  <div id="link-pop">
    <div class="pop-lbl">Insert Link</div>
    <input class="pop-inp" id="lnk-url" type="url" placeholder="https://…"/>
    <div class="pop-row">
      <button class="pop-btn pop-cancel" id="lnk-cancel">Cancel</button>
      <button class="pop-btn pop-apply"  id="lnk-apply">Apply</button>
    </div>
  </div>

  <!-- New topic modal -->
  <div id="modal-wrap">
    <div id="modal">
      <div class="m-title">New Topic</div>
      <p class="m-sub">Name this section of your notebook to begin writing.</p>
      <div style="margin-bottom:16px">
        <label class="m-lbl">Topic name</label>
        <input class="m-inp" id="m-topic-name" type="text" placeholder="e.g. Chapter 1, Project Notes…"/>
      </div>
      <div class="m-actions">
        <button class="m-cancel" id="m-cancel">Cancel</button>
        <button class="m-confirm" id="m-confirm">Start Writing</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
